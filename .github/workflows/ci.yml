name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  componentstest:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g pnpm@10 && pnpm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: copy env.template
        run: cp env.template .env
      - name: Run Playwright tests
        run: pnpm run test:components
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-components
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: coverage-ct
          path: coverage-reports/ct/
          retention-days: 1

  build:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g pnpm@10 && pnpm install
      - name: copy env.template
        run: cp env.template .env
      - name: Create AuthSecret
        run: echo "AUTH_SECRET=$(openssl rand -base64 32)" >> .env
      - name: Build Next.js
        env:
          E2E_MOCK_MAPS: "true"
          COVERAGE: "true"
        run: pnpm run build
      - name: Upload .next
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 1
          include-hidden-files: true

  e2etest:
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g pnpm@10 && pnpm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.project }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.project }}-
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps ${{ matrix.project }}
      - name: Download .next
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/
      - name: copy env.template
        run: cp env.template .env
      - name: Create AuthSecret
        run: echo "AUTH_SECRET=$(openssl rand -base64 32)" >> .env
      - name: Run Playwright tests
        env:
          APP_ENV: test
        run: pnpm exec playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-e2e-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && matrix.project == 'chromium' }}
        with:
          name: coverage-e2e-chromium
          path: coverage-reports/e2e/
          retention-days: 1

  coverage:
    needs: [componentstest, e2etest]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g pnpm@10 && pnpm install
      - name: Download CT coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-ct
          path: coverage-reports/ct
      - name: Download E2E Chromium coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-e2e-chromium
          path: coverage-reports/e2e
      - name: Merge coverage and check thresholds
        run: pnpm run coverage:merge
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: coverage-merged
          path: coverage-reports/merged/
          retention-days: 30

  lint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g pnpm@10 && pnpm install
      - name: Run ESLint
        run: pnpm run lint
